services:
  app:
    build: .
    expose:
      - "3000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/diet.db}
    volumes:
      - diet_data:/app/data
    networks:
      - coolify
    restart: unless-stopped

volumes:
  diet_data:

networks:
  coolify:
    external: true
